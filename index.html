<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompt Architect</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        
        .aspect-card {
            aspect-ratio: 2528 / 1696;
        }
        
        .card-shadow {
            box-shadow: 0 10px 40px -15px rgba(0, 0, 0, 0.7);
        }

        .animate-fade-in {
            animation: fadeIn 0.5s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="text-slate-100 min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // ИЗМЕНИТЕ ЭТУ ЦИФРУ, ЧТОБЫ ОБНОВИТЬ КАРТИНКИ (СБРОС КЭША)
        const CACHE_VERSION = 1;

        // Встроенные SVG иконки
        const Icons = {
            Refresh: () => (
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M3 21v-5h5"/></svg>
            ),
            Sparkles: () => (
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M19 17v4"/><path d="M3 5h4"/><path d="M17 19h4"/></svg>
            ),
            Copy: () => (
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>
            ),
            Check: () => (
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            ),
            Wand: () => (
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m2 22 1-1h3l9-9"/><path d="M3 21v-3l9-9"/><path d="m15 6 3-3"/><path d="m17 2 4 4"/><path d="m19 9 3-3"/><path d="m13 1 3 3"/><path d="m11 7 3-3"/></svg>
            ),
            Type: () => (
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" x2="15" y1="20" y2="20"/><line x1="12" x2="12" y1="4" y2="20"/></svg>
            ),
            External: () => (
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" x2="21" y1="14" y2="3"/></svg>
            ),
            Message: () => (
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            )
        };

        const App = () => {
            const [selectedTemplate, setSelectedTemplate] = useState(null);
            const [isInputVisible, setIsInputVisible] = useState(false);
            const [userText, setUserText] = useState('');
            const [prompts, setPrompts] = useState({ gemini: '', generic: '' });
            const [copiedType, setCopiedType] = useState(null);
            const [failedImages, setFailedImages] = useState({});

            const templates = [
                { id: 1, name: 'Risograph Story', color: '#ff007f', image: `./images/risograph.jpeg?v=${CACHE_VERSION}`, body: (t) => `Design type: preview with story\n\nComposition: Place the text on a light background, surround the text with a pattern that matches the text's meaning:\n\nText: ${t}\n\nIllustration style: A vibrant risograph-style illustration. Use bold neon and fluorescent colors like hot pink, bright orange, electric blue, and lime green. Include textures and layering typical of risograph printing, with slight misalignment and grainy ink effects. Artistic, graphic, and pop-art inspired.\n\nThe image should not contain: money and currency symbols, alcohol bottles and glasses, medical elements, scenes of violence, unnecessary text, or individual words.` },
                { id: 2, name: 'Bright Watercolor', color: '#f59e0b', image: `./images/watercolor-bright.jpg?v=${CACHE_VERSION}`, body: (t) => `Design type: preview with story\n\nComposition: Place the text on a light background, surround the text with a pattern that matches the text's meaning:\n\nText: ${t}\n\nIllustration style: colorful bright watercolor style\n\nThe image should not contain: money and currency symbols, alcohol bottles and glasses, medical elements, scenes of violence, unnecessary text, or individual words.` },
                { id: 3, name: 'Pastel Watercolor', color: '#7dd3fc', image: `./images/watercolor-pastel.jpg?v=${CACHE_VERSION}`, body: (t) => `Design type: preview with story\n\nComposition: Place the text on a light background, surround the text with a pattern that matches the text's meaning:\n\nText: ${t}\n\nIllustration style: soft pastel watercolor style\n\nThe image should not contain: money and currency symbols, alcohol bottles and glasses, medical elements, scenes of violence, unnecessary text, or individual words.` },
                { id: 4, name: 'Flat Pastel', color: '#6ee7b7', image: `./images/flat-pastel.jpg?v=${CACHE_VERSION}`, body: (t) => `Design type: preview with story\n\nComposition: Place the text on light background, surround the text with a pattern that matches the text's meaning:\n\nText: ${t}\n\nIllustration style: flat design, simple shapes, pastel colors\n\nThe image should not contain: money and currency symbols, alcohol bottles and glasses, medical elements, scenes of violence, unnecessary text, or individual words.` },
                { id: 5, name: 'Flat Bright', color: '#fb923c', image: `./images/flat-bright.jpg?v=${CACHE_VERSION}`, body: (t) => `Design type: preview with story\n\nComposition: Place the text on light background, surround the text with a dynamic pattern that matches the text's meaning:\n\nText: ${t}\n\nIllustration style: flat design, colorful bright colors\n\nThe image should not contain: money and currency symbols, alcohol bottles and glasses, medical elements, scenes of violence, unnecessary text, or individual words.` },
                { id: 6, name: 'Cartoon Pattern', color: '#a78bfa', image: `./images/cartoon-pattern.jpg?v=${CACHE_VERSION}`, body: (t) => `Design type: preview with story\n\nComposition: Place the text on light background, surround the text with pattern that matches the text's meaning, the image should not contain large block illustrations, only the pattern\n\nText: ${t}\n\nIllustration style: Cartoon illustration with bright, rich colors and simplified yet expressive shapes\nColors: the colors are pure, positive, saturated, do not use dark black and gloomy colors\n\nThe image should not contain: money and currency symbols, alcohol bottles and glasses, medical elements, scenes of violence, unnecessary text, or individual words.` },
                { id: 7, name: 'Hand Sketch', color: '#94a3b8', image: `./images/hand-sketch.jpg?v=${CACHE_VERSION}`, body: (t) => `Design type: preview with story\n\nComposition: Place the text on light background, surround the text with a pattern that matches the text's meaning:\n\nText: ${t}\n\nIllustration style: hand sketch with elements of contour illustration (Line Art)\nColors: the colors are pure, positive, saturated, do not use dark black and gloomy colors\n\nThe image should not contain: money and currency symbols, alcohol bottles and glasses, medical elements, scenes of violence, unnecessary text, or individual words.` },
                { id: 8, name: 'Mesh Gradient', color: '#6366f1', image: `./images/mesh-gradient.jpg?v=${CACHE_VERSION}`, body: (t) => `Design type: preview with story\n\nComposition: Place the text on light background, surround the text with a pattern that matches the text's meaning:\n\nText: ${t}\n\nIllustration style: digital illustrations. The style features soft, meshy gradients with a smooth airbrushed look, blending vibrant colors. The image has slight motion blur and depth, with sculpted shadows and soft transitions. Set against a flat bright background. The overall vibe is playful, energetic, and modern, with a semi-3D, plasticky texture reminiscent of mesh gradient illustrations\n\nThe image should not contain: money and currency symbols, alcohol bottles and glasses, medical elements, scenes of violence, unnecessary text, or individual words.` },
                { id: 9, name: 'Sticker Style', color: '#f43f5e', image: `./images/sticker-style.jpg?v=${CACHE_VERSION}`, body: (t) => `Design type: preview with story\n\nComposition: Place the text on light background, surround the text with a dynamic pattern that matches the text's meaning:\n\nText: ${t}\n\nIllustration style: sticker style\n\nColors: the colors are pure, positive, saturated, do not use dark black and gloomy colors\n\nThe image should not contain: money and currency symbols, alcohol bottles and glasses, medical elements, scenes of violence, unnecessary text, or individual words.` }
            ];

            const handleCreatePrompt = () => {
                if (!selectedTemplate) return;
                const text = userText.trim() || "creative subject";
                const body = selectedTemplate.body(text);
                
                setPrompts({
                    gemini: `Use image 1 as an aspect ratio reference\n\n${body}`,
                    generic: `aspect ratio 3:2\n\n${body}`
                });
                setIsInputVisible(false);
            };

            const copyToClipboard = (text, type) => {
                const textArea = document.createElement("textarea");
                textArea.value = text;
                document.body.appendChild(textArea);
                textArea.select();
                try {
                    document.execCommand('copy');
                    setCopiedType(type);
                    setTimeout(() => setCopiedType(null), 2000);
                } catch (err) { console.error("Copy failed", err); }
                document.body.removeChild(textArea);
            };

            const reset = () => {
                setSelectedTemplate(null);
                setIsInputVisible(false);
                setUserText('');
                setPrompts({ gemini: '', generic: '' });
            };

            return (
                <div className="p-4 md:p-8 max-w-6xl mx-auto pb-24 animate-fade-in">
                    <header className="mb-12 text-center flex flex-col items-center">
                        <div className="flex items-center justify-center gap-4 mb-3">
                            <h1 className="text-4xl md:text-6xl font-black bg-gradient-to-r from-sky-400 to-indigo-500 bg-clip-text text-transparent tracking-tighter">
                                Prompt Architect
                            </h1>
                            <button onClick={reset} className="text-slate-500 hover:text-white transition-all p-2 rounded-full hover:bg-white/10 active:scale-90">
                                <Icons.Refresh />
                            </button>
                        </div>
                        <p className="text-slate-400 text-xs md:text-sm font-bold tracking-[0.2em] uppercase">
                            SELECT STYLE & TYPE DESCRIPTION <span className="text-sky-400">IN ENGLISH</span>
                        </p>
                    </header>

                    {/* Сетка шаблонов */}
                    {!prompts.gemini && (
                        <div className="grid grid-cols-2 md:grid-cols-3 gap-4 md:gap-8 mb-12">
                            {templates.map(t => (
                                <button 
                                    key={t.id} 
                                    onClick={() => { setSelectedTemplate(t); setIsInputVisible(false); }}
                                    className={`group relative aspect-card rounded-[2rem] md:rounded-[3rem] overflow-hidden border-2 transition-all duration-500 card-shadow ${
                                        selectedTemplate?.id === t.id 
                                        ? 'border-sky-500 ring-8 ring-sky-500/10 scale-[1.03]' 
                                        : 'border-slate-800 hover:border-slate-600 hover:scale-[1.01]'
                                    }`}
                                >
                                    <div className="absolute inset-0 bg-slate-900 flex items-center justify-center">
                                        {t.image && !failedImages[t.id] ? (
                                            <img 
                                                src={t.image} 
                                                className="w-full h-full object-cover opacity-70 group-hover:opacity-100 transition-all duration-700"
                                                onError={() => setFailedImages(prev => ({...prev, [t.id]: true}))}
                                            />
                                        ) : (
                                            <div className="flex flex-col items-center gap-2">
                                                <div className="w-0 h-0 border-l-[30px] border-l-transparent border-r-[30px] border-r-transparent border-bottom-[50px] opacity-30" style={{ borderBottomColor: t.color }} />
                                                <span className="text-[10px] text-slate-700 font-black tracking-widest uppercase">No Image</span>
                                            </div>
                                        )}
                                    </div>
                                    <div className="absolute bottom-0 inset-x-0 p-3 md:p-5 bg-slate-950/90 backdrop-blur-md text-[9px] md:text-[11px] font-black uppercase tracking-[0.2em] text-center border-t border-white/5 transition-all group-hover:bg-slate-900">
                                        {t.name}
                                    </div>
                                </button>
                            ))}
                        </div>
                    )}

                    {/* Секция ввода */}
                    {!prompts.gemini && (
                        <div className="flex flex-col items-center gap-8 min-h-[160px]">
                            {selectedTemplate && !isInputVisible && (
                                <button 
                                    onClick={() => setIsInputVisible(true)} 
                                    className="group flex items-center gap-4 px-12 py-6 bg-sky-500 hover:bg-sky-400 text-slate-950 rounded-full font-black text-xl transition-all shadow-2xl shadow-sky-500/30 active:scale-95"
                                >
                                    <Icons.Type />
                                    ADD PREVIEW TEXT
                                </button>
                            )}
                            {isInputVisible && (
                                <div className="w-full max-w-2xl space-y-5 animate-fade-in">
                                    <input 
                                        type="text" 
                                        value={userText} 
                                        onChange={(e) => setUserText(e.target.value)} 
                                        onKeyPress={(e) => e.key === 'Enter' && handleCreatePrompt()}
                                        placeholder={`Describe subject for "${selectedTemplate.name}"...`}
                                        className="w-full bg-slate-900/80 border-2 border-slate-700 rounded-[2rem] px-10 py-7 focus:border-sky-500 outline-none text-2xl transition-all shadow-inner placeholder:text-slate-600 text-center" 
                                        autoFocus 
                                    />
                                    <button 
                                        onClick={handleCreatePrompt} 
                                        className="w-full bg-indigo-600 py-6 rounded-2xl font-black text-xl uppercase tracking-widest hover:bg-indigo-500 transition-all shadow-xl flex items-center justify-center gap-4 active:scale-95"
                                    >
                                        <Icons.Wand />
                                        Create Prompt
                                    </button>
                                </div>
                            )}
                        </div>
                    )}

                    {/* Результаты */}
                    {prompts.gemini && (
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8 animate-fade-in mt-4">
                            <PromptBox 
                                title="For Gemini" 
                                icon={<Icons.Sparkles />} 
                                color="sky" 
                                value={prompts.gemini} 
                                onChange={(v) => setPrompts(p => ({...p, gemini: v}))} 
                                onCopy={() => copyToClipboard(prompts.gemini, 'gemini')} 
                                isCopied={copiedType === 'gemini'} 
                                link="https://gemini.google.com/" 
                            />
                            <PromptBox 
                                title="For ChatGPT" 
                                icon={<Icons.Message />} 
                                color="emerald" 
                                value={prompts.generic} 
                                onChange={(v) => setPrompts(p => ({...p, generic: v}))} 
                                onCopy={() => copyToClipboard(prompts.generic, 'generic')} 
                                isCopied={copiedType === 'generic'} 
                                link="https://chatgpt.com/" 
                            />
                            <div className="md:col-span-2 flex justify-center mt-4">
                                <button onClick={reset} className="flex items-center gap-2 text-slate-500 hover:text-white font-bold uppercase text-xs tracking-widest transition-all">
                                    <Icons.Refresh /> Start Over
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const PromptBox = ({ title, icon, color, value, onChange, onCopy, isCopied, link }) => (
            <div className="bg-slate-900/60 backdrop-blur-3xl border border-slate-800 rounded-[3rem] p-8 md:p-10 relative flex flex-col shadow-2xl overflow-hidden">
                <div className={`absolute top-0 left-0 w-full h-2 ${color === 'sky' ? 'bg-sky-500' : 'bg-emerald-500'}`}></div>
                <div className="flex justify-between items-center mb-8">
                    <div className="flex items-center gap-4">
                        <span className={color === 'sky' ? 'text-sky-400' : 'text-emerald-400'}>{icon}</span>
                        <span className="text-xs font-black uppercase tracking-[0.3em] text-slate-500">{title}</span>
                    </div>
                    <button 
                        onClick={onCopy} 
                        className={`flex items-center gap-3 px-6 py-3 rounded-full font-black text-xs transition-all shadow-xl ${
                            isCopied ? 'bg-emerald-500 text-slate-950 scale-105' : 'bg-white text-slate-950 hover:bg-sky-400 active:scale-95'
                        }`}
                    >
                        {isCopied ? <Icons.Check /> : <Icons.Copy />}
                        {isCopied ? 'COPIED!' : 'COPY'}
                    </button>
                </div>
                <textarea 
                    value={value} 
                    onChange={(e) => onChange(e.target.value)} 
                    className="w-full h-80 bg-slate-950/80 rounded-3xl p-7 text-slate-300 font-mono text-sm leading-relaxed resize-none outline-none focus:ring-2 focus:ring-white/5 custom-scrollbar shadow-inner" 
                />
                <a 
                    href={link} 
                    target="_blank" 
                    className="mt-8 py-5 bg-slate-800/50 hover:bg-slate-700 rounded-2xl text-[10px] font-black uppercase tracking-[0.2em] text-center border border-slate-700 transition-all hover:border-white/20 flex items-center justify-center gap-3"
                >
                    OPEN {title.split(' ')[1].toUpperCase()} <Icons.External />
                </a>
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
