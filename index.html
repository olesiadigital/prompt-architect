<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompt Architect</title>
    <!-- Подключаем Tailwind CSS для стилей -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Подключаем React и Babel для работы кода прямо в браузере -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Подключаем иконки Lucide -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Компонент иконки для Lucide
        const Icon = ({ name, size = 20, className = "" }) => {
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        const App = () => {
            const [selectedTemplate, setSelectedTemplate] = useState(null);
            const [isInputVisible, setIsInputVisible] = useState(false);
            const [userText, setUserText] = useState('');
            const [prompts, setPrompts] = useState({ gemini: '', generic: '' });
            const [copiedType, setCopiedType] = useState(null);

            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [selectedTemplate, isInputVisible, prompts, copiedType]);

            // Вспомогательная функция для сборки промпта
            const createFullPrompt = (arLine, body) => `${arLine}\n\n${body}`;

            // База шаблонов с путями к изображениям (папка images/)
            const templates = [
                {
                    id: 1,
                    name: 'Risograph Story',
                    color: '#ff007f',
                    image: './images/risograph.jpeg',
                    body: (text) => `Design type: preview with story\n\nComposition: Place the text on a light background, surround the text with a pattern that matches the text's meaning:\n\nText: ${text}\n\nIllustration style: A vibrant risograph-style illustration. Use bold neon and fluorescent colors like hot pink, bright orange, electric blue, and lime green. Include textures and layering typical of risograph printing, with slight misalignment and grainy ink effects. Artistic, graphic, and pop-art inspired.\n\nThe image should not contain: money and currency symbols, alcohol bottles and glasses, medical elements, scenes of violence, unnecessary text, or individual words.`
                },
                {
                    id: 2,
                    name: 'Bright Watercolor',
                    color: '#f59e0b',
                    image: './images/watercolor-bright.jpg',
                    body: (text) => `Design type: preview with story\n\nComposition: Place the text on a light background, surround the text with a pattern that matches the text's meaning:\n\nText: ${text}\n\nIllustration style: colorful bright watercolor style\n\nThe image should not contain: money and currency symbols, alcohol bottles and glasses, medical elements, scenes of violence, unnecessary text, or individual words.`
                },
                {
                    id: 3,
                    name: 'Pastel Watercolor',
                    color: '#7dd3fc',
                    image: './images/watercolor-pastel.jpg',
                    body: (text) => `Design type: preview with story\n\nComposition: Place the text on a light background, surround the text with a pattern that matches the text's meaning:\n\nText: ${text}\n\nIllustration style: soft pastel watercolor style\n\nThe image should not contain: money and currency symbols, alcohol bottles and glasses, medical elements, scenes of violence, unnecessary text, or individual words.`
                },
                {
                    id: 4,
                    name: 'Flat Pastel',
                    color: '#6ee7b7',
                    image: './images/flat-pastel.jpg',
                    body: (text) => `Design type: preview with story\n\nComposition: Place the text on light background, surround the text with a pattern that matches the text's meaning:\n\nText: ${text}\n\nIllustration style: flat design, simple shapes, pastel colors\n\nThe image should not contain: money and currency symbols, alcohol bottles and glasses, medical elements, scenes of violence, unnecessary text, or individual words.`
                },
                {
                    id: 5,
                    name: 'Flat Bright',
                    color: '#fb923c',
                    image: './images/flat-bright.jpg',
                    body: (text) => `Design type: preview with story\n\nComposition: Place the text on light background, surround the text with a dynamic pattern that matches the text's meaning:\n\nText: ${text}\n\nIllustration style: flat design, colorful bright colors\n\nThe image should not contain: money and currency symbols, alcohol bottles and glasses, medical elements, scenes of violence, unnecessary text, or individual words.`
                },
                {
                    id: 6,
                    name: 'Cartoon Pattern',
                    color: '#a78bfa',
                    image: './images/cartoon-pattern.jpg',
                    body: (text) => `Design type: preview with story\n\nComposition: Place the text on light background, surround the text with pattern that matches the text's meaning, the image should not contain large block illustrations, only the pattern\n\nText: ${text}\n\nIllustration style: Cartoon illustration with bright, rich colors and simplified yet expressive shapes\nColors: the colors are pure, positive, saturated, do not use dark black and gloomy colors\n\nThe image should not contain: money and currency symbols, alcohol bottles and glasses, medical elements, scenes of violence, unnecessary text, or individual words.`
                },
                {
                    id: 7,
                    name: 'Hand Sketch',
                    color: '#94a3b8',
                    image: './images/hand-sketch.jpg',
                    body: (text) => `Design type: preview with story\n\nComposition: Place the text on light background, surround the text with a pattern that matches the text's meaning:\n\nText: ${text}\n\nIllustration style: hand sketch with elements of contour illustration (Line Art)\nColors: the colors are pure, positive, saturated, do not use dark black and gloomy colors\n\nThe image should not contain: money and currency symbols, alcohol bottles and glasses, medical elements, scenes of violence, unnecessary text, or individual words.`
                },
                {
                    id: 8,
                    name: 'Mesh Gradient',
                    color: '#6366f1',
                    image: './images/mesh-gradient.jpg',
                    body: (text) => `Design type: preview with story\n\nComposition: Place the text on light background, surround the text with a pattern that matches the text's meaning:\n\nText: ${text}\n\nIllustration style: digital illustrations. The style features soft, meshy gradients with a smooth airbrushed look, blending vibrant colors. The image has slight motion blur and depth, with sculpted shadows and soft transitions. Set against a flat bright background. The overall vibe is playful, energetic, and modern, with a semi-3D, plasticky texture reminiscent of mesh gradient illustrations\n\nThe image should not contain: money and currency symbols, alcohol bottles and glasses, medical elements, scenes of violence, unnecessary text, or individual words.`
                },
                {
                    id: 10,
                    name: 'Sticker Style',
                    color: '#f43f5e',
                    image: './images/sticker-style.jpg',
                    body: (text) => `Design type: preview with story\n\nComposition: Place the text on light background, surround the text with a dynamic pattern that matches the text's meaning:\n\nText: ${text}\n\nIllustration style: sticker style\n\nColors: the colors are pure, positive, saturated, do not use dark black and gloomy colors\n\nThe image should not contain: money and currency symbols, alcohol bottles and glasses, medical elements, scenes of violence, unnecessary text, or individual words.`
                }
            ];

            const handleCreatePrompt = () => {
                if (!selectedTemplate) return;
                const text = userText.trim() || "your creative subject";
                const bodyContent = selectedTemplate.body(text);
                
                setPrompts({
                    gemini: createFullPrompt("Use image 1 as an aspect ratio reference", bodyContent),
                    generic: createFullPrompt("aspect ratio 3:2", bodyContent)
                });
            };

            const copyToClipboard = (text, type) => {
                const textArea = document.createElement("textarea");
                textArea.value = text;
                document.body.appendChild(textArea);
                textArea.select();
                try {
                    document.execCommand('copy');
                    setCopiedType(type);
                    setTimeout(() => setCopiedType(null), 2000);
                } catch (err) {
                    console.error("Copy failed", err);
                }
                document.body.removeChild(textArea);
            };

            const reset = () => {
                setSelectedTemplate(null);
                setIsInputVisible(false);
                setUserText('');
                setPrompts({ gemini: '', generic: '' });
            };

            return (
                <div className="p-4 md:p-8 max-w-6xl mx-auto">
                    <header className="mb-10 text-center flex flex-col items-center">
                        <div className="flex items-center justify-center gap-4 mb-2">
                            <h1 className="text-4xl font-black bg-gradient-to-r from-sky-400 to-indigo-500 bg-clip-text text-transparent">Prompt Architect</h1>
                            <button onClick={reset} className="text-slate-500 hover:text-white transition-colors">
                                <Icon name="refresh-ccw" size={24} />
                            </button>
                        </div>
                        <p className="text-slate-400 italic">Select style and enter description <span className="text-sky-400 font-bold uppercase tracking-tighter">in English</span></p>
                    </header>

                    {/* Сетка шаблонов 3:2 */}
                    <div className="grid grid-cols-2 md:grid-cols-3 gap-6 mb-10">
                        {templates.map(t => (
                            <button key={t.id} onClick={() => { setSelectedTemplate(t); setIsInputVisible(false); setPrompts({gemini:'', generic:''}); }}
                                className={`group relative aspect-[3/2] rounded-[2rem] overflow-hidden border-2 transition-all duration-300 ${selectedTemplate?.id === t.id ? 'border-sky-500 ring-4 ring-sky-500/10 scale-105 shadow-2xl shadow-sky-500/20' : 'border-slate-800 hover:border-slate-700'}`}>
                                <div className="absolute inset-0 bg-slate-900 flex items-center justify-center">
                                    <img src={t.image} alt="" className="w-full h-full object-cover opacity-60 group-hover:opacity-100 transition-opacity" 
                                        onError={(e) => { e.target.style.display='none'; }} 
                                    />
                                    <div className="w-0 h-0 border-l-[40px] border-l-transparent border-r-[40px] border-r-transparent border-bottom-[60px] opacity-40 transition-transform group-hover:scale-110" style={{ borderBottomColor: t.color }}></div>
                                </div>
                                <div className="absolute bottom-0 inset-x-0 p-3 bg-slate-950/80 backdrop-blur-md text-[10px] font-black uppercase tracking-widest text-center border-t border-white/5">{t.name}</div>
                            </button>
                        ))}
                    </div>

                    {/* Секция ввода */}
                    <div className="flex flex-col items-center gap-6 min-h-[140px]">
                        {selectedTemplate && !isInputVisible && !prompts.gemini && (
                            <button onClick={() => setIsInputVisible(true)} className="px-12 py-5 bg-sky-500 hover:bg-sky-400 text-slate-950 rounded-full font-black text-lg transition-all shadow-2xl shadow-sky-500/20 animate-in fade-in zoom-in">ADD PREVIEW TEXT</button>
                        )}
                        {isInputVisible && (
                            <div className="w-full max-w-2xl space-y-4 animate-in slide-in-from-bottom-6 duration-500">
                                <input type="text" value={userText} onChange={(e) => setUserText(e.target.value)} onKeyPress={(e) => e.key === 'Enter' && handleCreatePrompt()}
                                    placeholder={`Subject for "${selectedTemplate.name}" style?`}
                                    className="w-full bg-slate-900 border border-slate-700 rounded-3xl px-8 py-6 focus:ring-2 focus:ring-sky-500 outline-none text-xl transition-all shadow-inner" autoFocus />
                                <button onClick={handleCreatePrompt} className="w-full bg-indigo-600 py-5 rounded-2xl font-black text-lg uppercase tracking-widest hover:bg-indigo-500 transition-all shadow-lg">Create Prompt</button>
                            </div>
                        )}
                    </div>

                    {/* Результаты */}
                    {prompts.gemini && (
                        <div className="mt-12 grid grid-cols-1 md:grid-cols-2 gap-8 animate-in zoom-in duration-400">
                            <PromptBox 
                                title="For Gemini" 
                                icon="sparkles" 
                                color="sky" 
                                value={prompts.gemini} 
                                onChange={(v) => setPrompts({...prompts, gemini: v})} 
                                onCopy={() => copyToClipboard(prompts.gemini, 'gemini')} 
                                isCopied={copiedType === 'gemini'} 
                                link="https://gemini.google.com/" 
                            />
                            <PromptBox 
                                title="For ChatGPT" 
                                icon="message-square" 
                                color="emerald" 
                                value={prompts.generic} 
                                onChange={(v) => setPrompts({...prompts, generic: v})} 
                                onCopy={() => copyToClipboard(prompts.generic, 'generic')} 
                                isCopied={copiedType === 'generic'} 
                                link="https://chatgpt.com/" 
                            />
                        </div>
                    )}
                </div>
            );
        };

        const PromptBox = ({ title, icon, color, value, onChange, onCopy, isCopied, link }) => (
            <div className={`bg-slate-900/50 backdrop-blur-xl border border-slate-800 rounded-[2.5rem] p-8 relative flex flex-col shadow-2xl`}>
                <div className={`absolute top-0 left-0 w-full h-1.5 bg-${color === 'sky' ? 'sky-500' : 'emerald-500'}`}></div>
                <div className="flex justify-between items-center mb-6">
                    <div className="flex items-center gap-2">
                        <Icon name={icon} size={20} className={color === 'sky' ? 'text-sky-400' : 'text-emerald-400'} />
                        <span className="text-xs font-black uppercase tracking-widest text-slate-400">{title}</span>
                    </div>
                    <button onClick={onCopy} className={`px-6 py-2 rounded-full font-black text-xs transition-all shadow-lg ${isCopied ? 'bg-emerald-500 text-slate-950 scale-105' : 'bg-white text-slate-950 hover:bg-sky-400'}`}>
                        {isCopied ? 'COPIED!' : 'COPY'}
                    </button>
                </div>
                <textarea 
                    value={value} 
                    onChange={(e) => onChange(e.target.value)} 
                    className="w-full h-64 bg-slate-950/80 rounded-2xl p-6 text-slate-300 font-mono text-sm leading-relaxed resize-none outline-none focus:ring-1 focus:ring-white/10 custom-scrollbar shadow-inner" 
                />
                <a href={link} target="_blank" className="mt-6 py-4 bg-slate-800 hover:bg-slate-700 rounded-2xl text-[10px] font-black uppercase tracking-widest text-center border border-slate-700 transition-all hover:border-white/20">Open {title.split(' ')[1]}</a>
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
